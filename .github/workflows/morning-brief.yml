name: Global morning brief

on:
  schedule:
    # 08:30 Asia/Shanghai = 00:30 UTC. GitHub Actions schedules run in UTC.
    - cron: '30 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  models: read

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python morning_brief.py
        env:
          MAIL_TRANSPORT: gmail_oauth
          MAIL_FORMAT: plain
          EMAIL_FROM: conglei824@gmail.com
          EMAIL_TO: 465257249@qq.com
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODEL: openai/gpt-4o
          REQUIRE_AI_SUMMARY: 'true'
          MAX_ARTICLES: '18'
