name: Global morning brief

on:
  schedule:
    # 08:30 Asia/Shanghai = 00:30 UTC. GitHub Actions schedules run in UTC.
    - cron: '30 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  models: read

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python morning_brief.py
        env:
          MAIL_TRANSPORT: smtp
          MAIL_FORMAT: plain
          SMTP_HOST: smtp.qq.com
          SMTP_PORT: '465'
          SMTP_USERNAME: 465257249@qq.com
          SMTP_PASSWORD: ${{ secrets.QQ_SMTP_AUTH_CODE }}
          EMAIL_FROM: 465257249@qq.com
          EMAIL_TO: 465257249@qq.com
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODEL: openai/gpt-4o
          REQUIRE_AI_SUMMARY: 'true'
          MAX_ARTICLES: '18'
